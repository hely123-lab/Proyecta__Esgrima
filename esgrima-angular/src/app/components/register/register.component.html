<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="text-center mb-4">
        <i class="bi bi-person-plus-fill me-2"></i>Nou esgrimista
      </h4>

      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

      <div class="row">
        <div class="col mb-3">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control" [(ngModel)]="form.nom">
        </div>
        <div class="col mb-3">
          <label class="form-label">Cognoms</label>
          <input type="text" class="form-control" [(ngModel)]="form.cognoms">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="form.email">
      </div>
      <div class="mb-3">
        <label class="form-label">Contrasenya (mínim 6 caràcters)</label>
        <input type="password" class="form-control" [(ngModel)]="form.password">
      </div>
      <div class="row">
        <div class="col mb-3">
          <label class="form-label">Data de naixement</label>
          <input type="date" class="form-control" [(ngModel)]="form.dataNaixement">
        </div>
        <div class="col mb-3">
          <label class="form-label">Sexe</label>
          <select class="form-select" [(ngModel)]="form.sexe">
            <option value="">Selecciona...</option>
            <option value="M">Masculí</option>
            <option value="F">Femení</option>
            <option value="Altre">Altre</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Nivell</label>
        <select class="form-select" [(ngModel)]="form.nivell">
          <option value="">Selecciona...</option>
          <option value="BASIC">Bàsic</option>
          <option value="INTERMEDIATE">Intermedi</option>
          <option value="ADVANCED">Avançat</option>
        </select>
      </div>

      <button class="btn btn-dark w-100" (click)="register()" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Registrar-se
      </button>

      <p class="text-center mt-3 mb-0">
        Ja tens compte? <a routerLink="/login">Inicia sessió</a>
      </p>
    </div>
  </div>
</div>
